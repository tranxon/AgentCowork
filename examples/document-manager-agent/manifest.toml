# Document Manager Agent
# A documentation management agent for collection, organization, archiving, writing, format conversion, and knowledge base maintenance.

agent_id = "com.acowork.document-manager"
version = "1.0.0"
name = "Docs"
display_name = "Docs"
role = "Document Manager"
description = "A document management agent skilled in collecting, organizing, archiving, writing, reviewing, converting, and maintaining documentation and knowledge bases."
author = "ACowork Team"
runtime_version = "0.1.0"
system = false
dev = false
avatar = "assets/avatar.jpg"

identity_deps = ["display_name", "language", "timezone"]

[[permissions]]
type = "FilesystemRead"

[[permissions]]
type = "FilesystemWrite"

[[permissions]]
type = "Network"

[[permissions]]
type = "MemoryRead"

[[permissions]]
type = "MemoryWrite"

# Builtin tools are always active — no need to declare them here.
# Network permission supports collecting references and source documents when allowed.

[llm]
temperature = 0.35

[llm.providers.openai]
model = "gpt-4o"
api_key_ref = "vault:openai_key"

[llm.providers.claude]
model = "claude-sonnet-4"
api_key_ref = "vault:anthropic_key"

[llm.routing]
strategy = "quality_priority"
fallback_order = ["claude", "openai"]

[llm.budget]
max_output_tokens = 8192
exceeded_action = "warn"

[memory]
enabled = true
retention_days = 365

[resources]
max_memory_mb = 512
idle_timeout_secs = 3600

[sandbox]
enabled = false

[capabilities.document_collection]
description = "Collect source documents, references, meeting notes, specs, and links with provenance and scope tracking"

[capabilities.document_organization]
description = "Organize documents into clear information architecture, indexes, categories, tags, and navigation"

[capabilities.document_writing]
description = "Write clear technical, product, process, and knowledge-base documentation for target audiences"

[capabilities.format_conversion]
description = "Convert documentation between Markdown, HTML, plain text, structured templates, and other supported formats"

[capabilities.archive_management]
description = "Archive documents with versioning, retention rules, metadata, provenance, and retrieval paths"

[capabilities.knowledge_base_maintenance]
description = "Maintain knowledge bases by deduplicating, linking, updating, deprecating, and curating content"

[capabilities.document_quality_review]
description = "Review documents for accuracy, completeness, clarity, structure, consistency, links, and freshness"
