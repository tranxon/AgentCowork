# Calendar Agent Example
# S5.6: Multi-agent collaboration — calendar event management

agent_id = "com.example.calendar"
version = "1.0.0"
name = "Calendar Agent"
description = "A calendar agent that creates, queries, and deletes events via Intent calls"
author = "Rollball Team"
runtime_version = "0.1.0"
system = false
dev = false

identity_deps = ["timezone"]

[[permissions]]
type = "MemoryRead"

[[permissions]]
type = "MemoryWrite"

[[permissions]]
type = "IntentSend"

[[permissions]]
type = "IntentReceive"

[[tools]]
name = "memory_store"

[[tools]]
name = "memory_recall"

[[tools]]
name = "intent_send"

[llm]
provider = "openai"
model = "gpt-4"
temperature = 0.3

[llm.providers.openai]
model = "gpt-4o"
api_key_ref = "vault:openai_key"

[llm.providers.claude]
model = "claude-sonnet-4"
api_key_ref = "vault:anthropic_key"

[llm.routing]
strategy = "quality_priority"
fallback_order = ["openai", "claude"]

[llm.budget]
max_output_tokens = 2048
exceeded_action = "stop"

[memory]
enabled = true
retention_days = 90

[resources]
max_memory_mb = 256
idle_timeout_secs = 3600

[sandbox]
enabled = false

[capabilities.event_create]
description = "Create a calendar event with title, time, and optional description"

[capabilities.event_query]
description = "Query calendar events by date range or keyword"

[capabilities.event_delete]
description = "Delete a calendar event by ID"
